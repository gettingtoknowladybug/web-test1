<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辨識瓢蟲 - 瓢蟲·集</title>
    
    <!-- Teachable Machine 庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-text: #1A1A1A;
            --color-accent: #C72027;
            --color-line: #D0D0D0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 三欄佈局 */
        .page-wrapper {
            display: grid;
            grid-template-columns: 1fr minmax(auto, 500px) 1fr;
            min-height: 100vh;
            position: relative;
        }

        .side-panel {
            background: #F5F5F5;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
        }

        .main-content {
            background: var(--color-bg);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--color-accent);
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header-logo {
            height: 50px;
            cursor: pointer;
        }

        .header-logo img {
            height: 100%;
            width: auto;
        }

        .hamburger-menu {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 0;
        }

        .hamburger-line {
            width: 30px;
            height: 3px;
            background: white;
            transition: all 0.3s ease;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 3rem 2rem;
            overflow-y: auto;
        }

        .page-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        /* Upload Section */
        .upload-section {
            background: #FAFAFA;
            border: 2px dashed var(--color-line);
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            border-radius: 8px;
        }

        .upload-text {
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }

        .upload-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .upload-btn {
            padding: 1rem 1.5rem;
            background: var(--color-text);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .upload-btn:hover {
            background: var(--color-accent);
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Preview Section */
        .preview-section {
            display: none;
            margin-bottom: 2rem;
        }

        .preview-section.active {
            display: block;
        }

        #preview-image, #webcam-container canvas {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border: 1px solid var(--color-line);
            margin-bottom: 1rem;
            border-radius: 8px;
            background: #000;
        }

        #webcam-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--color-accent);
            color: white;
        }

        .btn-primary:hover {
            background: #A01B1F;
        }

        .btn-secondary {
            background: white;
            color: var(--color-text);
            border: 2px solid var(--color-line);
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        /* Result Section */
        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-card {
            background: #FAFAFA;
            border: 2px solid var(--color-accent);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 8px;
        }

        .result-title {
            font-size: 1.75rem;
            font-weight: 500;
            color: var(--color-accent);
            margin-bottom: 1rem;
        }

        .predictions-list {
            margin-top: 1rem;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: white;
            border-radius: 4px;
            border: 1px solid var(--color-line);
        }

        .prediction-name {
            font-weight: 500;
        }

        .prediction-confidence {
            color: var(--color-accent);
            font-weight: 600;
        }

        .confidence-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .confidence-fill {
            height: 100%;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }

        /* Loading */
        .loading-section {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .loading-section.active {
            display: block;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #F0F0F0;
            border-top: 4px solid var(--color-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Sticker Overlay */
        .sticker-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }

        .sticker-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .sticker-container {
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .sticker-badge {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--color-accent);
            box-shadow: 0 10px 40px rgba(199, 32, 39, 0.4);
        }

        .sticker-icon {
            font-size: 4rem;
        }

        .sticker-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-top: 0.5rem;
        }

        .sticker-message {
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .sticker-submessage {
            color: white;
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .sticker-close-btn {
            background: white;
            color: var(--color-text);
            border: none;
            border-radius: 8px;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sticker-close-btn:hover {
            background: var(--color-accent);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Side Menu */
        .side-menu {
            position: fixed;
            top: -100%;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--color-accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: top 0.4s ease;
            z-index: 10000;
            display: flex;
            flex-direction: column;
        }

        .side-menu.active {
            top: 0;
        }

        .menu-header {
            background: var(--color-accent);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .menu-close {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: transform 0.3s ease;
        }

        .menu-close:hover {
            transform: rotate(90deg);
        }

        .menu-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
        }

        .menu-item {
            text-decoration: none;
            color: white;
            font-size: 1.125rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }

        .menu-item-icon {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
            color: var(--color-accent);
        }

        .menu-item:hover .menu-item-icon {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .menu-item-text-zh {
            font-size: 1.125rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        .menu-item-text-en {
            font-size: 0.75rem;
            opacity: 0.9;
            letter-spacing: 0.05em;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 2rem;
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-item:last-child::after {
            display: none;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-wrapper {
                grid-template-columns: 1fr;
            }

            .side-panel {
                display: none;
            }

            .main-content {
                box-shadow: none;
            }

            .header {
                padding: 0.75rem 1rem;
            }

            .header-logo {
                height: 45px;
            }

            .hamburger-menu {
                right: 1rem;
            }

            .content-area {
                padding: 2rem 1.5rem;
            }

            .page-title {
                font-size: 1.75rem;
            }

            .upload-buttons {
                flex-direction: column;
            }

            .upload-btn {
                width: 100%;
            }

            .button-group {
                flex-direction: column;
            }

            .side-menu {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Side Menu -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <button class="menu-close" id="menuClose">×</button>
        </div>
        <div class="menu-content">
            <nav class="menu-nav">
                <a href="index.html" class="menu-item">
                    <div class="menu-item-icon"><img src="menu-item-icon.png" alt="home" width="40px" height="40px"></div>
                    <div class="menu-item-text-zh">首頁</div>
                    <div class="menu-item-text-en">Home</div>
                </a>
                <a href="about.html" class="menu-item">
                    <div class="menu-item-icon"><img src="menu-item-icon1.png" alt="about" width="40px" height="40px"></div>
                    <div class="menu-item-text-zh">關於我們</div>
                    <div class="menu-item-text-en">About</div>
                    
                </a>
                <a href="about.html" class="menu-item">
                    <div class="menu-item-icon"><img src="menu-item-icon1.png" alt="about" width="40px" height="40px"></div>
                    <div class="menu-item-text-zh">關於我們</div>
                    <div class="menu-item-text-en">About</div>
                    
                </a>
            </nav>
        </div>
    </div>

    <!-- Sticker Overlay -->
    <div class="sticker-overlay" id="stickerOverlay">
        <div class="sticker-container">
            <div class="sticker-badge">
                <div class="sticker-icon" id="stickerIcon">🐞</div>
                <div class="sticker-name" id="stickerName">瓢蟲名稱</div>
            </div>
            <div class="sticker-message">恭喜收集成功！</div>
            <div class="sticker-submessage">請將收集到的瓢蟲貼至指南上<br>留下相遇的紀念！</div>
            <button class="sticker-close-btn" onclick="closeStickerOverlay()">繼續收集</button>
        </div>
    </div>

    <div class="page-wrapper">
        <!-- Left Side Panel -->
        <div class="side-panel"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-logo" onclick="window.location.href='index.html'">
                    <img src="logo.png" alt="瓢蟲·集">
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <h1 class="page-title">🤖 AI 辨識瓢蟲</h1>

                <!-- Upload Section -->
                <div class="upload-section" id="uploadSection">
                    <div class="upload-text">選擇辨識方式</div>
                    
                    <div class="upload-buttons">
                        <button class="upload-btn" onclick="startWebcam()" id="webcamBtn">
                            📹 開啟相機辨識
                        </button>
                        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                            📁 上傳照片辨識
                        </button>
                    </div>
                    
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>

                <!-- Webcam Section -->
                <div class="preview-section" id="webcamSection">
                    <div id="webcam-container"></div>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="stopWebcam()">停止相機</button>
                    </div>
                </div>

                <!-- Photo Preview Section -->
                <div class="preview-section" id="previewSection">
                    <img id="previewImage" class="preview-image" alt="預覽圖片">
                    <div class="button-group">
                        <button class="btn btn-primary" id="identifyBtn">開始辨識</button>
                        <button class="btn btn-secondary" onclick="resetUpload()">重新上傳</button>
                    </div>
                </div>

                <!-- Loading Section -->
                <div class="loading-section" id="loadingSection">
                    <div class="loading-spinner"></div>
                    <div style="font-size: 1.125rem; color: var(--color-accent);">AI 辨識中...</div>
                </div>

                <!-- Result Section -->
                <div class="result-section" id="resultSection">
                    <div class="result-card">
                        <h2 class="result-title" id="resultTitle">辨識結果</h2>
                        <div class="predictions-list" id="predictionsList"></div>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="resetUpload()">再辨識一次</button>
                        <button class="btn btn-secondary" onclick="window.location.href='index.html'">回到首頁</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side Panel -->
        <div class="side-panel"></div>
    </div>

    <script type="text/javascript">
        // ==================== Teachable Machine 設定 ====================
        
        // TODO: 將 "./my_model/" 替換成您的模型資料夾路徑
        const URL = "./my_model/";
        
        let model, webcam, maxPredictions;
        let isWebcamActive = false;
        let predictionInterval;

        // 瓢蟲資料庫（用於顯示圖示和收集）
        const ladybugDatabase = {
            '橙瓢蟲': { icon: '🟠' },
            '橙瓢蟲幼蟲': { icon: '🔶' },
            '黃瓢蟲': { icon: '🟡' },
            '黃瓢蟲幼蟲': { icon: '🔸' },
            '六條瓢蟲': { icon: '🔴' },
            '六條瓢蟲幼蟲': { icon: '🔺' },
            '龜紋瓢蟲': { icon: '🟤' },
            '龜紋瓢蟲幼蟲': { icon: '🟫' },
            '錨紋瓢蟲': { icon: '⚓' },
            '錨紋瓢蟲幼蟲': { icon: '🔱' },
            '七星瓢蟲': { icon: '🐞' },
            '七星瓢蟲幼蟲': { icon: '🦗' }
        };

        let collectedLadybugs = JSON.parse(localStorage.getItem('collectedLadybugs') || '[]');

        // ==================== 載入模型 ====================
        
        async function loadModel() {
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                console.log("✅ 模型載入成功！共", maxPredictions, "個類別");
            } catch (error) {
                console.error("❌ 模型載入失敗：", error);
                alert("模型載入失敗，請確認 my_model 資料夾是否存在且包含 model.json 和 metadata.json");
            }
        }

        // 頁面載入時就載入模型
        window.addEventListener('load', loadModel);

        // ==================== 相機辨識 ====================
        
        async function startWebcam() {
            if (!model) {
                alert("模型尚未載入完成，請稍候");
                return;
            }

            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('webcamSection').classList.add('active');
            document.getElementById('webcamBtn').disabled = true;

            try {
                const flip = true;
                webcam = new tmImage.Webcam(300, 300, flip);
                await webcam.setup();
                await webcam.play();
                
                document.getElementById("webcam-container").innerHTML = '';
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                isWebcamActive = true;
                
                // 開始持續預測
                predictionInterval = setInterval(async () => {
                    if (isWebcamActive && webcam) {
                        webcam.update();
                        await predictWebcam();
                    }
                }, 500); // 每 0.5 秒預測一次
                
            } catch (error) {
                console.error("相機啟動失敗：", error);
                alert("無法啟動相機，請確認已授權相機權限");
                stopWebcam();
            }
        }

        async function predictWebcam() {
            if (!webcam || !model) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            // 找出信心度最高的預測
            const topPrediction = prediction.reduce((max, pred) => 
                pred.probability > max.probability ? pred : max
            );

            // 如果信心度超過 70%，顯示結果
            if (topPrediction.probability > 0.7) {
                showWebcamResult(prediction, topPrediction);
            }
        }

        function showWebcamResult(allPredictions, topPrediction) {
            // 停止相機並顯示結果
            stopWebcam();
            displayResults(allPredictions);
            
            // 檢查是否為新收集的瓢蟲
            const ladybugName = topPrediction.className;
            if (ladybugDatabase[ladybugName] && !collectedLadybugs.includes(ladybugName)) {
                collectedLadybugs.push(ladybugName);
                localStorage.setItem('collectedLadybugs', JSON.stringify(collectedLadybugs));
                showStickerAnimation(ladybugName);
            }
        }

        function stopWebcam() {
            isWebcamActive = false;
            if (predictionInterval) {
                clearInterval(predictionInterval);
            }
            if (webcam) {
                webcam.stop();
            }
            document.getElementById('webcamSection').classList.remove('active');
            document.getElementById('webcamBtn').disabled = false;
        }

        // ==================== 照片上傳辨識 ====================
        
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file && file.type.match('image.*')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    document.getElementById('uploadSection').style.display = 'none';
                    document.getElementById('previewSection').classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('identifyBtn').addEventListener('click', async () => {
            if (!model) {
                alert("模型尚未載入完成，請稍候");
                return;
            }

            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('loadingSection').classList.add('active');

            setTimeout(async () => {
                await predictImage();
            }, 1000);
        });

        async function predictImage() {
            try {
                const prediction = await model.predict(previewImage);
                
                document.getElementById('loadingSection').classList.remove('active');
                displayResults(prediction);
                
                // 檢查最高信心度的預測
                const topPrediction = prediction.reduce((max, pred) => 
                    pred.probability > max.probability ? pred : max
                );
                
                const ladybugName = topPrediction.className;
                if (topPrediction.probability > 0.5 && ladybugDatabase[ladybugName]) {
                    if (!collectedLadybugs.includes(ladybugName)) {
                        collectedLadybugs.push(ladybugName);
                        localStorage.setItem('collectedLadybugs', JSON.stringify(collectedLadybugs));
                        setTimeout(() => {
                            showStickerAnimation(ladybugName);
                        }, 500);
                    }
                }
            } catch (error) {
                console.error("預測失敗：", error);
                alert("辨識失敗，請重試");
                document.getElementById('loadingSection').classList.remove('active');
                document.getElementById('previewSection').classList.add('active');
            }
        }

        // ==================== 顯示結果 ====================
        
        function displayResults(predictions) {
            // 按信心度排序
            predictions.sort((a, b) => b.probability - a.probability);
            
            const predictionsList = document.getElementById('predictionsList');
            predictionsList.innerHTML = '';
            
            // 只顯示前 3 個結果
            predictions.slice(0, 3).forEach(pred => {
                const percentage = (pred.probability * 100).toFixed(1);
                const icon = ladybugDatabase[pred.className]?.icon || '🐞';
                
                const item = document.createElement('div');
                item.className = 'prediction-item';
                item.innerHTML = `
                    <div>
                        <div class="prediction-name">${icon} ${pred.className}</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                    <div class="prediction-confidence">${percentage}%</div>
                `;
                predictionsList.appendChild(item);
            });
            
            document.getElementById('resultSection').classList.add('active');
        }

        // ==================== 貼紙動畫 ====================
        
        function showStickerAnimation(ladybugName) {
            const info = ladybugDatabase[ladybugName];
            if (!info) return;
            
            document.getElementById('stickerIcon').textContent = info.icon;
            document.getElementById('stickerName').textContent = ladybugName;
            document.getElementById('stickerOverlay').classList.add('active');
        }

        function closeStickerOverlay() {
            document.getElementById('stickerOverlay').classList.remove('active');
        }

        // ==================== 重置 ====================
        
        function resetUpload() {
            stopWebcam();
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('webcamSection').classList.remove('active');
            document.getElementById('loadingSection').classList.remove('active');
            document.getElementById('resultSection').classList.remove('active');
            fileInput.value = '';
        }

        // ==================== 選單控制 ====================
        
        const hamburgerMenu = document.getElementById('hamburgerMenu');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        hamburgerMenu.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMenu();
            }
        });
    </script>
</body>
</html>
